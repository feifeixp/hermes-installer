name: build-image

# Build the cloud-deploy Docker image and push to up to three registries:
#   - ghcr.io/feifeixp/hermes-webui                                  (international users — always)
#   - registry.cn-shanghai.aliyuncs.com/neowow/hermes-webui          (personal ACR — fast CN pulls)
#   - zlxj-registry.ap-southeast-1.cr.aliyuncs.com/hermes/hermes     (ENTERPRISE ACR — Path B,
#                                                                    Aliyun-side build pipeline cooperation;
#                                                                    only fires when ENTERPRISE_ACR_* secrets are set;
#                                                                    repo name configurable via vars.ENTERPRISE_ACR_REPO)
#
# Triggers:
#   - main branch push (only when WebUI / agent code or Dockerfile changed)
#   - manual workflow_dispatch (for one-off rebuilds without a code change)
#
# Tags pushed:
#   - latest (always)
#   - main-<sha7> (always — for rollbacks / reproducibility)
#   - v<version> (only on tag pushes — TODO once we cut releases)
#
# Setup required (one-time):
#   1. Repository → Settings → Secrets and variables → Actions
#   2. Personal ACR (existing): ALIYUN_ACR_USERNAME + ALIYUN_ACR_PASSWORD secrets,
#      ALIYUN_ACR_REGISTRY + ALIYUN_ACR_NAMESPACE variables (defaults work).
#   3. Enterprise ACR (new, Path B): ENTERPRISE_ACR_USERNAME + ENTERPRISE_ACR_PASSWORD
#      secrets (USE A CI SUB-ACCOUNT — never the master account weilikeji2021),
#      and ENTERPRISE_ACR_REGISTRY + ENTERPRISE_ACR_NAMESPACE variables.
#
# Both ACR targets are independently optional — if either set of credentials is
# missing, that push is silently skipped (job still succeeds — ghcr.io alone
# is enough for international use). Path B exists so the enterprise side's
# Aliyun build pipeline can pull our same image (zlxj/hermes-webui:latest)
# instead of rebuilding from source.

on:
  push:
    branches: [main]
    paths:
      # Rebuild when image-relevant files change. Keep this list narrow
      # so doc-only commits don't burn build minutes.
      - 'docker/Dockerfile.webui'
      - 'docker/docker-compose.yml.template'
      - 'docker/Caddyfile.template'
      - 'webui/**'
      - 'main.py'
      - 'app.py'
      - '.dockerignore'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:        # manual trigger from Actions UI

# Single in-flight build per ref — superseded runs cancel automatically.
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write    # needed to push to ghcr.io

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # QEMU not needed — amd64 only. Re-add when arm64 returns:
      #   - name: Set up QEMU
      #     uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        env:
          # Personal ACR (existing). Two formats supported:
          #   - Enterprise edition: registry.cn-shanghai.aliyuncs.com
          #   - Personal edition:   crpi-XXXXXXXX.cn-shanghai.personal.cr.aliyuncs.com
          # User sets ALIYUN_ACR_REGISTRY in repo secrets/variables to
          # override. Defaults to enterprise-edition URL — change here if
          # everyone's on personal edition.
          ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY || 'registry.cn-shanghai.aliyuncs.com' }}
          # The namespace within ACR (= the "组" / group). Personal edition
          # users: this MUST exist in your ACR console — auto-created
          # repositories don't materialize the namespace, you have to
          # create it manually first.
          ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE || 'neowow' }}
          # Enterprise ACR (Path B — Aliyun-side build pipeline cooperation).
          # No default — both vars must be explicitly set in repo Variables.
          # When unset, enterprise_tags is empty and that push target gets
          # skipped automatically in the tags-compose step below.
          #
          # ENTERPRISE_ACR_REPO is the repo name inside the namespace; defaults
          # to `hermes-webui` for backward compat with the cn-shanghai zlxj
          # repo. Override in repo Variables if your Enterprise ACR org uses a
          # different repo name (e.g. ENTERPRISE_ACR_REPO=hermes when the path
          # is `${REG}/hermes/hermes:latest`).
          ENT_REGISTRY:  ${{ vars.ENTERPRISE_ACR_REGISTRY }}
          ENT_NAMESPACE: ${{ vars.ENTERPRISE_ACR_NAMESPACE }}
          ENT_REPO:      ${{ vars.ENTERPRISE_ACR_REPO || 'hermes-webui' }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          # Newline-separated tag list, used by both push targets.
          {
            echo "ghcr_tags<<EOF"
            echo "ghcr.io/feifeixp/hermes-webui:latest"
            echo "ghcr.io/feifeixp/hermes-webui:main-${SHORT_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "acr_tags<<EOF"
            echo "${ACR_REGISTRY}/${ACR_NAMESPACE}/hermes-webui:latest"
            echo "${ACR_REGISTRY}/${ACR_NAMESPACE}/hermes-webui:main-${SHORT_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # Enterprise ACR tags — only emitted when both vars are set,
          # so a missing var doesn't bake a literal "//hermes-webui:..."
          # into the tag list. The tags-compose step gates the push on
          # the credentials check, but generating sensible tags only
          # when the registry/namespace are known is cleaner.
          {
            echo "enterprise_tags<<EOF"
            if [[ -n "$ENT_REGISTRY" && -n "$ENT_NAMESPACE" ]]; then
              echo "${ENT_REGISTRY}/${ENT_NAMESPACE}/${ENT_REPO}:latest"
              echo "${ENT_REGISTRY}/${ENT_NAMESPACE}/${ENT_REPO}:main-${SHORT_SHA}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # Also export registries so the login steps can reference them.
          echo "acr_registry=${ACR_REGISTRY}"            >> "$GITHUB_OUTPUT"
          echo "enterprise_registry=${ENT_REGISTRY}"     >> "$GITHUB_OUTPUT"

      # ── Login to both registries ─────────────────────────────────────
      # Login to ghcr.io first (always available — uses GITHUB_TOKEN);
      # then optionally login to Aliyun ACR if credentials are set.
      # Then a SINGLE build/push step pushes to both — saves ~10 min vs
      # the previous "build twice" approach.

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Aliyun ACR credentials
        id: check_acr
        run: |
          if [[ -n "${{ secrets.ALIYUN_ACR_USERNAME }}" && -n "${{ secrets.ALIYUN_ACR_PASSWORD }}" ]]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ALIYUN_ACR_* secrets not set; pushing to ghcr.io only. Add ALIYUN_ACR_USERNAME + ALIYUN_ACR_PASSWORD secrets to enable China-friendly mirror."
          fi

      - name: Login to Aliyun ACR
        id: acr_login
        # continue-on-error: a failed login to personal ACR (expired
        # token, rate-limit, etc.) shouldn't block the enterprise push
        # or the GHCR push. The downstream Compose-tag-list step
        # gates inclusion on BOTH have_creds AND acr_login outcome,
        # so a failed login cleanly drops just THIS target.
        continue-on-error: true
        if: steps.check_acr.outputs.have_creds == 'true'
        uses: docker/login-action@v3
        with:
          # Resolved earlier in the meta step. Personal edition users
          # need to set the vars.ALIYUN_ACR_REGISTRY repo variable to
          # their crpi-XXXXXX.cn-shanghai.personal.cr.aliyuncs.com URL.
          registry: ${{ steps.meta.outputs.acr_registry }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      # ── Enterprise ACR (Path B) ────────────────────────────────────
      # Mirrors the personal-ACR block above. Independent on/off:
      # missing secrets/vars just skip this push target. The CI sub-
      # account credentials live in ENTERPRISE_ACR_USERNAME / _PASSWORD
      # (never the master account weilikeji2021 — sub-account so a
      # leaked token can be revoked without nuking the org).
      - name: Check Enterprise ACR credentials
        id: check_enterprise_acr
        run: |
          if [[ -n "${{ secrets.ENTERPRISE_ACR_USERNAME }}" \
             && -n "${{ secrets.ENTERPRISE_ACR_PASSWORD }}" \
             && -n "${{ steps.meta.outputs.enterprise_registry }}" ]]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Enterprise ACR push skipped — set ENTERPRISE_ACR_USERNAME + ENTERPRISE_ACR_PASSWORD secrets and ENTERPRISE_ACR_REGISTRY + ENTERPRISE_ACR_NAMESPACE variables to enable Path B."
          fi

      - name: Login to Enterprise ACR
        id: ent_login
        continue-on-error: true   # mirror the Aliyun ACR step — independent target
        if: steps.check_enterprise_acr.outputs.have_creds == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.enterprise_registry }}
          username: ${{ secrets.ENTERPRISE_ACR_USERNAME }}
          password: ${{ secrets.ENTERPRISE_ACR_PASSWORD }}

      - name: Compose final tag list
        id: tags
        run: |
          # GHCR always; personal ACR + enterprise ACR each gated on
          # BOTH the credentials check AND the login step's outcome.
          # If a login step was skipped or failed (continue-on-error),
          # its `outcome` is "skipped" / "failure" — only "success"
          # earns inclusion. This keeps the buildx push from trying
          # to push to a registry we never authenticated to.
          {
            echo "all<<EOF"
            echo "${{ steps.meta.outputs.ghcr_tags }}"
            if [[ "${{ steps.acr_login.outcome }}" == "success" ]]; then
              echo "${{ steps.meta.outputs.acr_tags }}"
            fi
            if [[ "${{ steps.ent_login.outcome }}" == "success" ]]; then
              echo "${{ steps.meta.outputs.enterprise_tags }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (single build → both registries)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.webui
          # amd64 only for now — arm64 builds via QEMU emulation take
          # 5-10x longer (~30 min vs ~10 min) and we have no Apple
          # Silicon production users yet. Aliyun / Tencent ECS are all
          # x86_64. Apple Silicon devs can build amd64 locally via
          # Rosetta + buildx (`docker build --platform linux/amd64`).
          # Add `linux/arm64` back here when Phase 2 lands ARM ECS.
          platforms: linux/amd64
          push: true
          # Pass the union of GHCR + ACR tags. docker buildx pushes the
          # SAME built image to all listed tags — single build, multi
          # destination. ~half the time of "build, push, build, push".
          tags: ${{ steps.tags.outputs.all }}
          # Bake the commit SHA into api/_version.py so ?v= cache-busting
          # on static assets gets a real value instead of "unknown".
          build-args: HERMES_VERSION=main-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # cleaner image; no SBOM/attestation file

      # ── Summary ──────────────────────────────────────────────────────
      - name: Summary
        if: success()
        run: |
          {
            echo "## ✅ Image push complete"
            echo ""
            echo "**ghcr.io tags (international):**"
            echo '```'
            echo "${{ steps.meta.outputs.ghcr_tags }}"
            echo '```'
            if [[ "${{ steps.acr_login.outcome }}" == "success" ]]; then
              echo "**Aliyun ACR tags (personal / China):**"
              echo '```'
              echo "${{ steps.meta.outputs.acr_tags }}"
              echo '```'
            elif [[ "${{ steps.check_acr.outputs.have_creds }}" == "true" ]]; then
              echo "_⚠️ Aliyun ACR login FAILED — check ALIYUN_ACR_PASSWORD hasn't expired._"
            else
              echo "_Aliyun ACR push skipped — set \`ALIYUN_ACR_USERNAME\` + \`ALIYUN_ACR_PASSWORD\` secrets to enable._"
            fi
            if [[ "${{ steps.ent_login.outcome }}" == "success" ]]; then
              echo "**Enterprise ACR tags (Path B):**"
              echo '```'
              echo "${{ steps.meta.outputs.enterprise_tags }}"
              echo '```'
            elif [[ "${{ steps.check_enterprise_acr.outputs.have_creds }}" == "true" ]]; then
              echo "_⚠️ Enterprise ACR login FAILED — check ENTERPRISE_ACR_PASSWORD hasn't expired._"
            else
              echo "_Enterprise ACR push skipped — set \`ENTERPRISE_ACR_USERNAME\` + \`ENTERPRISE_ACR_PASSWORD\` secrets and \`ENTERPRISE_ACR_REGISTRY\` + \`ENTERPRISE_ACR_NAMESPACE\` variables to enable Path B._"
            fi
            echo ""
            echo "**Deploy with:**"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/feifeixp/hermes-installer/main/docker/bootstrap-docker.sh \\\\"
            echo "  | sudo bash -s -- chat.example.com"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
