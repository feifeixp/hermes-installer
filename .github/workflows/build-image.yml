name: build-image

# Build the cloud-deploy Docker image and push to two registries:
#   - ghcr.io/feifeixp/hermes-webui                                  (international users — always)
#   - registry.cn-shanghai.aliyuncs.com/neowow/hermes-webui          (personal ACR — fast CN pulls)
#
# Enterprise ACR (zlxj/hermes-webui) is handled by Aliyun's OWN build pipeline,
# not this workflow — see Aliyun ACR Enterprise console → 镜像仓库 →
# zlxj/hermes-webui → 构建. That pipeline pulls source directly from GitHub
# and builds in Aliyun's VPC, so we don't need public-internet access from
# GitHub Runner → enterprise ACR endpoint. Net: no enterprise creds in
# GitHub Secrets, no IP whitelist juggling, no DNS issues. The trade-off
# is a few extra minutes for the Aliyun-side build to complete after each
# main push; in practice it's running in parallel with this workflow.
#
# Triggers:
#   - main branch push (only when WebUI / agent code or Dockerfile changed)
#   - manual workflow_dispatch (for one-off rebuilds without a code change)
#
# Tags pushed:
#   - latest (always)
#   - main-<sha7> (always — for rollbacks / reproducibility)
#   - v<version> (only on tag pushes — TODO once we cut releases)
#
# Setup required (one-time):
#   1. Repository → Settings → Secrets and variables → Actions
#   2. Personal ACR: ALIYUN_ACR_USERNAME + ALIYUN_ACR_PASSWORD secrets,
#      ALIYUN_ACR_REGISTRY + ALIYUN_ACR_NAMESPACE variables (defaults work).
#
# If ALIYUN_ACR_* aren't set, the Aliyun push is silently skipped — job
# still succeeds with just the ghcr.io push.

on:
  push:
    branches: [main]
    paths:
      # Rebuild when image-relevant files change. Keep this list narrow
      # so doc-only commits don't burn build minutes.
      - 'docker/Dockerfile.webui'
      - 'docker/docker-compose.yml.template'
      - 'docker/Caddyfile.template'
      - 'webui/**'
      - 'main.py'
      - 'app.py'
      - '.dockerignore'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:        # manual trigger from Actions UI

# Single in-flight build per ref — superseded runs cancel automatically.
concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      packages: write    # needed to push to ghcr.io

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # QEMU not needed — amd64 only. Re-add when arm64 returns:
      #   - name: Set up QEMU
      #     uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        env:
          # Personal ACR (existing). Two formats supported:
          #   - Enterprise edition: registry.cn-shanghai.aliyuncs.com
          #   - Personal edition:   crpi-XXXXXXXX.cn-shanghai.personal.cr.aliyuncs.com
          # User sets ALIYUN_ACR_REGISTRY in repo secrets/variables to
          # override. Defaults to enterprise-edition URL — change here if
          # everyone's on personal edition.
          ACR_REGISTRY: ${{ vars.ALIYUN_ACR_REGISTRY || 'registry.cn-shanghai.aliyuncs.com' }}
          # The namespace within ACR (= the "组" / group). Personal edition
          # users: this MUST exist in your ACR console — auto-created
          # repositories don't materialize the namespace, you have to
          # create it manually first.
          ACR_NAMESPACE: ${{ vars.ALIYUN_ACR_NAMESPACE || 'neowow' }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Newline-separated tag list, used by both push targets.
          {
            echo "ghcr_tags<<EOF"
            echo "ghcr.io/feifeixp/hermes-webui:latest"
            echo "ghcr.io/feifeixp/hermes-webui:main-${SHORT_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "acr_tags<<EOF"
            echo "${ACR_REGISTRY}/${ACR_NAMESPACE}/hermes-webui:latest"
            echo "${ACR_REGISTRY}/${ACR_NAMESPACE}/hermes-webui:main-${SHORT_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # Also export ACR_REGISTRY so the login step can use it.
          echo "acr_registry=${ACR_REGISTRY}" >> "$GITHUB_OUTPUT"

      # ── Login to both registries ─────────────────────────────────────
      # Login to ghcr.io first (always available — uses GITHUB_TOKEN);
      # then optionally login to Aliyun ACR if credentials are set.
      # Then a SINGLE build/push step pushes to both — saves ~10 min vs
      # the previous "build twice" approach.

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Aliyun ACR credentials
        id: check_acr
        run: |
          if [[ -n "${{ secrets.ALIYUN_ACR_USERNAME }}" && -n "${{ secrets.ALIYUN_ACR_PASSWORD }}" ]]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ALIYUN_ACR_* secrets not set; pushing to ghcr.io only. Add ALIYUN_ACR_USERNAME + ALIYUN_ACR_PASSWORD secrets to enable China-friendly mirror."
          fi

      - name: Login to Aliyun ACR
        if: steps.check_acr.outputs.have_creds == 'true'
        uses: docker/login-action@v3
        with:
          # Resolved earlier in the meta step. Personal edition users
          # need to set the vars.ALIYUN_ACR_REGISTRY repo variable to
          # their crpi-XXXXXX.cn-shanghai.personal.cr.aliyuncs.com URL.
          registry: ${{ steps.meta.outputs.acr_registry }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Compose final tag list
        id: tags
        run: |
          # GHCR tags always included; ACR tags only if credentials are set.
          {
            echo "all<<EOF"
            echo "${{ steps.meta.outputs.ghcr_tags }}"
            if [[ "${{ steps.check_acr.outputs.have_creds }}" == "true" ]]; then
              echo "${{ steps.meta.outputs.acr_tags }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (single build → both registries)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.webui
          # amd64 only for now — arm64 builds via QEMU emulation take
          # 5-10x longer (~30 min vs ~10 min) and we have no Apple
          # Silicon production users yet. Aliyun / Tencent ECS are all
          # x86_64. Apple Silicon devs can build amd64 locally via
          # Rosetta + buildx (`docker build --platform linux/amd64`).
          # Add `linux/arm64` back here when Phase 2 lands ARM ECS.
          platforms: linux/amd64
          push: true
          # Pass the union of GHCR + ACR tags. docker buildx pushes the
          # SAME built image to all listed tags — single build, multi
          # destination. ~half the time of "build, push, build, push".
          tags: ${{ steps.tags.outputs.all }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # cleaner image; no SBOM/attestation file

      # ── Summary ──────────────────────────────────────────────────────
      - name: Summary
        if: success()
        run: |
          {
            echo "## ✅ Image push complete"
            echo ""
            echo "**ghcr.io tags (international):**"
            echo '```'
            echo "${{ steps.meta.outputs.ghcr_tags }}"
            echo '```'
            if [[ "${{ steps.check_acr.outputs.have_creds }}" == "true" ]]; then
              echo "**Aliyun ACR tags (China):**"
              echo '```'
              echo "${{ steps.meta.outputs.acr_tags }}"
              echo '```'
            else
              echo "_Aliyun ACR push skipped — set \`ALIYUN_ACR_USERNAME\` + \`ALIYUN_ACR_PASSWORD\` secrets to enable._"
            fi
            echo ""
            echo "_Enterprise ACR (\`zlxj/hermes-webui\`) is built by Aliyun's own pipeline — not pushed here._"
            echo ""
            echo "**Deploy with:**"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/feifeixp/hermes-installer/main/docker/bootstrap-docker.sh \\\\"
            echo "  | sudo bash -s -- chat.example.com"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
