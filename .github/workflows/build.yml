name: Build

on:
  push:
    # `main` covers production. `sync/**` covers in-progress upstream sync
    # work — these branches go through long iteration cycles (re-build .exe
    # → user retests Windows install → fix → re-push) and we want CI to
    # rebuild on each push without depending on PR sync events, which can
    # lag minutes behind a `git push` on busy days.
    branches: [main, 'sync/**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Workflow-level permissions for the GITHUB_TOKEN. Required so the
# `softprops/action-gh-release` step can upload artifacts + call
# generate-release-notes on tag-triggered runs. Without this we got:
#   "Resource not accessible by integration" on the generate-release-
#   notes API call (read-only token is the default for forked/PR runs
#   on some repos, and for any repo where Settings → Actions → General
#   → Workflow permissions is "Read repository contents only").
#
# `contents: write` covers BOTH: creating/updating the release row
# AND uploading the asset files. `pull-requests: read` lets
# generate-release-notes enumerate PRs since the last tag for the
# auto-changelog. Both are safe — neither lets the workflow modify
# unrelated code.
permissions:
  contents: write
  pull-requests: read
  actions: write      # needed to dispatch mirror-to-oss workflow

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # WebUI test suite — pytest
  # ═══════════════════════════════════════════════════════════════════════
  # The suite was red for months without anyone noticing because CI was
  # build-only. Tests MUST run from webui/ (they read static/… via relative
  # paths); conftest.py spawns an isolated test server on an auto-derived
  # port with its own state dir. hermes-agent is not installed on the
  # runner — conftest auto-skips the agent-dependent tests.
  webui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # ~60 frontend tests execute JS snippets via `node` subprocesses
      # (markdown rendering, session time sync, model picker de-dup, …).
      # Runners ship node, but pin it explicitly so image churn can't
      # silently change the JS engine under the suite.
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install test deps
        run: pip install -r webui/requirements.txt pytest

      - name: Run webui test suite
        working-directory: webui
        run: pytest -q -p no:cacheprovider

  # ═══════════════════════════════════════════════════════════════════════
  # macOS — .dmg
  # ═══════════════════════════════════════════════════════════════════════
  macos:
    runs-on: macos-latest
    steps:
      # v5 is current as of mid-2026; ships with Node 22 (post-deprecation
      # of Node 20). v4 still works but emits the deprecation warning the
      # user reported.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install deps
        run: pip install pywebview pyinstaller

      - name: Bundle uv binary (macOS)
        run: |
          set -euo pipefail
          # Bundle a uv binary at tools/uv so first-run install can create the
          # agent venv + pip install OFFLINE from the bundle (no git / Xcode CLT
          # / github clone). Mirrors the Windows tools/uv.exe bundling.
          pip install uv
          # Locate the EXACT binary pip just installed (interpreter-relative),
          # not whatever `uv` happens to be first on PATH — a stray uv on the
          # runner's PATH (or setup-python's script dir missing from PATH) would
          # otherwise make us bundle the wrong/older binary silently.
          UV_BIN="$(python -c 'import sysconfig, os; p = os.path.join(sysconfig.get_path("scripts"), "uv"); print(p if os.path.exists(p) else "")')"
          if [ -z "$UV_BIN" ]; then echo "ERROR: pip-installed uv not found in interpreter scripts dir"; exit 1; fi
          mkdir -p tools
          cp "$UV_BIN" tools/uv
          chmod +x tools/uv
          # Fail loudly if the bundled binary isn't arm64 (macos-latest is arm64;
          # a wrong-arch binary would only surface as a crash on the user's Mac).
          file tools/uv | grep -q arm64 || { echo "ERROR: bundled uv is not arm64: $(file tools/uv)"; exit 1; }
          echo "bundled uv: $(tools/uv --version)"

      - name: Bundle hermes-agent source (offline install)
        run: python bundle_source.py

      # ── Code signing + notarization ─────────────────────────────────────
      # Gated on secrets: when the Apple credentials are configured the build
      # is Developer-ID-signed, hardened-runtime, and notarized so Gatekeeper
      # opens it with no warning. When the secrets are ABSENT (forks, or
      # before they are set up) the signing steps no-op via `if: ...` and the
      # build falls back to an unsigned .app — CI never breaks. The cert is
      # imported BEFORE PyInstaller so PyInstaller can sign the .app (incl.
      # Python.framework) inside-out during the build — see hermes_installer.spec.
      # See docs/macos-signing.md for how to obtain + configure the 6 secrets.
      - name: Detect signing availability
        id: signcfg
        env:
          CERT: ${{ secrets.APPLE_CERT_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Apple signing secrets present - will sign + notarize"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing secrets absent - building UNSIGNED (Gatekeeper will block on user machines)"
          fi

      - name: Import signing certificate
        if: steps.signcfg.outputs.enabled == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -uo pipefail   # NOT -e: we check each step explicitly for clear errors
          KEYCHAIN="$RUNNER_TEMP/hermes-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          # 1. Decode the base64 cert; fail loudly if the secret is empty/garbled.
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH" || {
            echo "::error::APPLE_CERT_P12_BASE64 failed to base64-decode"; exit 1; }
          SZ=$(wc -c < "$CERT_PATH" | tr -d ' ')
          echo "decoded .p12 size: ${SZ} bytes"
          if [ "$SZ" -lt 500 ]; then
            echo "::error::decoded .p12 is only ${SZ} bytes — APPLE_CERT_P12_BASE64 is empty/truncated"
            exit 1
          fi

          # 2. Pre-validate the .p12 password + that it contains a private key,
          #    using openssl so we get a precise verdict (security import's
          #    error is generic). Never prints the password.
          if openssl pkcs12 -in "$CERT_PATH" -nokeys -passin "pass:${APPLE_CERT_PASSWORD}" -info >/dev/null 2>/tmp/p12err; then
            echo "p12 password OK (openssl MAC verified)"
          else
            echo "::error::p12 password REJECTED by openssl — APPLE_CERT_PASSWORD does not match this .p12"
            sed -E 's/.*(invalid password|Mac verify error).*/\1/' /tmp/p12err | head -2
            exit 1
          fi
          if openssl pkcs12 -in "$CERT_PATH" -nocerts -passin "pass:${APPLE_CERT_PASSWORD}" -nodes 2>/dev/null | grep -q "PRIVATE KEY"; then
            echo "p12 contains a private key: OK"
          else
            echo "::error::p12 has NO private key — re-export from Keychain selecting the cert WITH its key"
            exit 1
          fi

          # 3. Create + unlock a temp keychain.
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN" || {
            echo "::error::create-keychain failed (APPLE_KEYCHAIN_PASSWORD missing/empty?)"; exit 1; }
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN" || {
            echo "::error::unlock-keychain failed"; exit 1; }

          # 4. Import the cert+key, allowing codesign/productsign to use the key.
          security import "$CERT_PATH" -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN" || {
            echo "::error::security import failed despite openssl pre-check passing"; exit 1; }
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null 2>&1 || true
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_PATH"

          # 5. Resolve the Developer ID Application identity.
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.*\"(.*)\"/\1/')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::no 'Developer ID Application' identity found after import"
            echo "--- identities in keychain: ---"
            security find-identity -v -p codesigning "$KEYCHAIN" || true
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "imported identity: $IDENTITY"

      - name: PyInstaller
        env:
          # _meta.py reads this to embed the correct version into Info.plist.
          # On tag builds it's vX.Y.Z; on branch/PR builds it's the branch name
          # which _meta.py treats as non-semver and falls back to git describe.
          INSTALLER_VERSION: ${{ github.ref_name }}
          # When signing is configured (Import signing certificate ran first),
          # hand the identity + entitlements to PyInstaller so it signs the
          # whole .app — every nested Mach-O incl. Python.framework — inside-out
          # with hardened runtime, the only reliable way to pass notarization.
          # Empty when unsigned → spec falls back to codesign_identity=None.
          HERMES_CODESIGN_IDENTITY: ${{ env.SIGN_IDENTITY }}
          HERMES_ENTITLEMENTS: ${{ github.workspace }}/.github/macos/entitlements.plist
          # Fail the build loudly if PyInstaller can't sign the bundle, instead
          # of warning + emitting a broken bundle that only fails 10 min later
          # at notarization. And have PyInstaller verify its own signature
          # (incl. the xattr check that catches a Mach-O wrongly shipped as a
          # data file). Both only when signing is configured — the unsigned
          # fallback build does ad-hoc signing and must not be made strict.
          PYINSTALLER_STRICT_BUNDLE_CODESIGN_ERROR: ${{ steps.signcfg.outputs.enabled == 'true' && '1' || '0' }}
          PYINSTALLER_VERIFY_BUNDLE_SIGNATURE: ${{ steps.signcfg.outputs.enabled == 'true' && '1' || '0' }}
        run: python -m PyInstaller hermes_installer.spec --noconfirm --clean

      - name: Verify .app
        run: |
          if [ ! -d "dist/Neowow Studio.app" ]; then
            echo "ERROR: .app not found"
            exit 1
          fi
          echo "✓ .app: $(du -sh 'dist/Neowow Studio.app' | cut -f1)"

      - name: Verify .app signature
        if: steps.signcfg.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          APP="dist/Neowow Studio.app"
          # PyInstaller signed the whole bundle during the build (codesign_identity
          # + entitlements from env). Verify it's a valid hardened-runtime
          # Developer ID signature before we notarize.
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dv --verbose=4 "$APP" 2>&1 | grep -iE "Authority|TeamIdentifier|flags|Identifier" || true
          echo ".app signature verified"

      - name: Create .dmg
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          # MUST use `ditto`, NOT `cp -r`, to stage the signed .app: `cp -r`
          # DEREFERENCES the Python.framework symlinks (Contents/Frameworks/Python,
          # Contents/Resources/Python, Python.framework/Python) into duplicate real
          # files, which breaks the bundle's code seal — codesign then reports
          # "bundle format is ambiguous" and Apple notarization rejects it with
          # "The signature of the binary is invalid" on exactly those paths.
          # `ditto` preserves symlinks + xattrs + the signature. (Verified by
          # local repro: cp-staged copy FAILS `codesign --verify`, ditto PASSES.)
          ditto "dist/Neowow Studio.app" "$TMP/Neowow Studio.app"
          # Belt-and-suspenders: confirm the STAGED copy (the one that goes into
          # the dmg) still has a valid signature, so a staging regression fails
          # here at build time instead of 10 min later at notarization.
          if [ "${{ steps.signcfg.outputs.enabled }}" = "true" ]; then
            codesign --verify --deep --strict --verbose=2 "$TMP/Neowow Studio.app"
          fi
          ln -s /Applications "$TMP/Applications"
          hdiutil create \
            -volname "Neowow Studio" \
            -srcfolder "$TMP" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "dist/Hermes-Installer-macOS.dmg"
          rm -rf "$TMP"
          echo "✓ .dmg: $(du -sh dist/Hermes-Installer-macOS.dmg | cut -f1)"

      - name: Sign + notarize + staple .dmg
        if: steps.signcfg.outputs.enabled == 'true'
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          DMG="dist/Hermes-Installer-macOS.dmg"
          codesign --force --timestamp \
            --keychain "$SIGN_KEYCHAIN" \
            --sign "$SIGN_IDENTITY" \
            "$DMG"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          echo "--- submitting to Apple notary service (waits for result) ---"
          SUB_JSON="$RUNNER_TEMP/notar.json"
          set +e
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --output-format json --wait > "$SUB_JSON"
          NOTAR_RC=$?
          set -e
          cat "$SUB_JSON" || true
          SUB_ID="$(python3 -c "import json,sys;print(json.load(open('$SUB_JSON')).get('id',''))" 2>/dev/null || true)"
          SUB_STATUS="$(python3 -c "import json,sys;print(json.load(open('$SUB_JSON')).get('status',''))" 2>/dev/null || true)"
          echo "notarization status: ${SUB_STATUS:-unknown} (rc=$NOTAR_RC)"
          if [ "$SUB_STATUS" != "Accepted" ]; then
            echo "::error::notarization not Accepted (status=$SUB_STATUS) — fetching Apple's detailed log:"
            if [ -n "$SUB_ID" ]; then
              xcrun notarytool log "$SUB_ID" \
                --key "$KEY_PATH" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID" || true
            fi
            rm -f "$KEY_PATH"
            exit 1
          fi
          rm -f "$KEY_PATH"
          xcrun stapler staple "$DMG"
          echo "--- final Gatekeeper assessment ---"
          spctl -a -t open --context context:primary-signature -vv "$DMG" || true
          echo ".dmg signed + notarized + stapled"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v5
        with:
          name: Hermes-Installer-macOS
          path: dist/Hermes-Installer-macOS.dmg
          retention-days: 30

      - name: Upload .dmg to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Hermes-Installer-macOS.dmg
          generate_release_notes: true

  # ═══════════════════════════════════════════════════════════════════════
  # Windows — .exe + .zip
  # ═══════════════════════════════════════════════════════════════════════
  windows:
    # Pin to windows-2022 to dodge the windows-2025 → windows-2025-vs2026
    # migration GitHub announced (May 12, 2026 deadline). The new image
    # ships VS2026 build tools which can break PyInstaller's
    # binary-collection hooks for older C extension wheels until they
    # catch up. Bump to windows-2025-vs2026 after testing once it stabilizes.
    runs-on: windows-2022
    steps:
      # v5 is current as of mid-2026; ships with Node 22 (post-deprecation
      # of Node 20). v4 still works but emits the deprecation warning the
      # user reported.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install deps
        run: pip install pywebview pyinstaller

      - name: Download uv.exe for bundling
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Download latest uv for Windows x64
          $url = "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip"
          Write-Host "Downloading uv from $url ..."
          Invoke-WebRequest -Uri $url -OutFile uv_download.zip -UseBasicParsing -TimeoutSec 60
          New-Item -ItemType Directory -Force -Path tools | Out-Null
          Expand-Archive -Path uv_download.zip -DestinationPath uv_tmp -Force
          # The zip contains uv.exe at the root
          Copy-Item uv_tmp\uv.exe tools\uv.exe -Force
          Remove-Item uv_download.zip, uv_tmp -Recurse -Force
          & tools\uv.exe --version | Out-Null
          $size = [math]::Round((Get-Item tools\uv.exe).Length / 1MB, 1)
          Write-Host "✓ tools\uv.exe ready ($size MB)"

      - name: Bundle hermes-agent source (offline install)
        run: python bundle_source.py

      - name: PyInstaller
        env:
          INSTALLER_VERSION: ${{ github.ref_name }}
        run: python -m PyInstaller hermes_installer.spec --noconfirm --clean

      - name: Verify .exe
        shell: pwsh
        run: |
          $exe = 'dist\Hermes Installer.exe'
          if (-not (Test-Path $exe)) {
            Write-Error "ERROR: .exe not found"
            exit 1
          }
          Write-Host "✓ .exe found"

      - name: Create .zip
        shell: pwsh
        run: |
          Compress-Archive -Path 'dist\Hermes Installer.exe' -DestinationPath 'dist\Hermes-Installer-Windows.zip' -Force
          Write-Host "✓ .zip created"

      - name: Upload .exe + .zip artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Hermes-Installer-Windows
          path: |
            dist/Hermes-Installer-Windows.zip
            dist/Hermes Installer.exe
          retention-days: 30

      - name: Upload .exe + .zip to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Hermes-Installer-Windows.zip
            dist/Hermes Installer.exe
          generate_release_notes: true

  # ═══════════════════════════════════════════════════════════════════════
  # Mirror — dispatch OSS sync after both builds upload to the release
  # ═══════════════════════════════════════════════════════════════════════
  #
  # WHY: GitHub does not propagate the `release: published` event to
  # other workflows when the release is created/updated by GITHUB_TOKEN
  # (softprops/action-gh-release uses GITHUB_TOKEN). This is by design
  # to prevent infinite workflow loops. So mirror-to-oss.yml's
  # `on: release: [published]` trigger never fires automatically.
  #
  # FIX: Run this job after both macOS + Windows jobs succeed, and
  # explicitly dispatch mirror-to-oss.yml with the tag name.
  mirror:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Dispatch mirror-to-oss
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Dispatching mirror-to-oss for tag: $TAG"
          gh workflow run mirror-to-oss.yml \
            --repo "${{ github.repository }}" \
            --field tag="$TAG"
          echo "✓ mirror-to-oss dispatched (runs async in background)"
