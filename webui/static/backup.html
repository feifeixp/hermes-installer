<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>备份管理 · Hermes</title>
<style>
  :root {
    --bg: #0f1117; --bg-card: #1a1d27; --border: rgba(255,255,255,0.08);
    --text: #e2e8f0; --text-2: #94a3b8; --accent: #6366f1;
    --success: #22c55e; --danger: #ef4444; --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: var(--bg);
         color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; display: flex;
       align-items: center; gap: 0.5rem; }
  .card { background: var(--bg-card); border: 1px solid var(--border);
          border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.75rem; }
  label { display: flex; align-items: center; gap: 0.5rem; margin: 0.4rem 0;
          font-size: 0.88rem; color: var(--text-2); cursor: pointer; }
  label input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); }
  label .size { margin-left: auto; font-size: 0.78rem; opacity: 0.6; }
  input[type=text] { width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 7px; color: var(--text);
    padding: 0.5rem 0.75rem; font-size: 0.88rem; outline: none;
    margin-top: 0.5rem; }
  input[type=text]:focus { border-color: var(--accent); }
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1.1rem;
         border-radius: 8px; font-size: 0.88rem; font-weight: 500;
         cursor: pointer; border: 1px solid transparent; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-ghost   { background: transparent; border-color: var(--border); color: var(--text-2); }
  .btn-danger  { background: transparent; border-color: rgba(239,68,68,0.4); color: #f87171; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px;
                  margin: 0.75rem 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px;
                   transition: width 0.3s; }
  .chip { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 99px;
          background: rgba(99,102,241,0.18); color: var(--accent); margin: 2px 2px 2px 0; }
  .backup-row { display: flex; justify-content: space-between; align-items: flex-start;
                gap: 1rem; flex-wrap: wrap; }
  .backup-meta { flex: 1; min-width: 0; }
  .backup-label { font-weight: 600; font-size: 0.92rem; white-space: nowrap;
                  overflow: hidden; text-overflow: ellipsis; }
  .backup-info  { font-size: 0.78rem; color: var(--text-2); margin-top: 3px; }
  .backup-actions { display: flex; gap: 0.4rem; flex-shrink: 0; flex-wrap: wrap; }
  .status { font-size: 0.82rem; padding: 0.4rem 0.75rem; border-radius: 7px;
            margin-top: 0.5rem; }
  .status.ok   { background: rgba(34,197,94,0.12); color: var(--success); }
  .status.err  { background: rgba(239,68,68,0.12);  color: var(--danger); }
  .status.info { background: rgba(99,102,241,0.12); color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  #backup-list-container .empty {
    text-align: center; color: var(--text-2); font-size: 0.9rem; padding: 2rem 0; }
</style>
</head>
<body>
<div class="container">
  <h1>☁️ 备份管理</h1>

  <!-- Local data summary -->
  <div class="card">
    <div class="card-title">本地数据概览</div>
    <div id="summary-loading" style="color:var(--text-2);font-size:0.85rem">加载中…</div>
    <div id="summary-content" style="display:none"></div>
  </div>

  <!-- Create backup -->
  <div class="card">
    <div class="card-title">创建新备份</div>
    <div>
      <label><input type="checkbox" value="sessions"  checked> 对话历史 <span class="size" id="sz-sessions"></span></label>
      <label><input type="checkbox" value="memories"  checked> 记忆 (MEMORY.md) <span class="size" id="sz-memories"></span></label>
      <label><input type="checkbox" value="config"    checked> 配置 (config.yaml) <span class="size" id="sz-config"></span></label>
      <label><input type="checkbox" value="skills"    checked> 技能 <span class="size" id="sz-skills"></span></label>
      <label><input type="checkbox" value="state_db"        > 状态数据库 (state.db) <span class="size" id="sz-state_db"></span></label>
      <label><input type="checkbox" value="kanban_db"       > 看板 (kanban.db) <span class="size" id="sz-kanban_db"></span></label>
    </div>
    <input type="text" id="backup-label" placeholder="备份备注（可选）" maxlength="200" style="margin-top:0.75rem">
    <div class="progress-bar" id="progress-bar" style="display:none">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div style="margin-top:0.75rem;display:flex;gap:0.5rem;align-items:center">
      <button class="btn btn-primary" id="btn-create" onclick="createBackup()">📦 备份到云端</button>
      <span id="create-status" style="font-size:0.82rem;color:var(--text-2)"></span>
    </div>
  </div>

  <hr class="divider">

  <!-- Cloud backup list -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
    <div style="font-weight:600;font-size:1rem">云端备份列表</div>
    <button class="btn btn-ghost" onclick="loadList()" style="font-size:0.8rem;padding:0.35rem 0.75rem">刷新</button>
  </div>
  <div id="backup-list-container">
    <div class="empty">加载中…</div>
  </div>
</div>

<script>
const API = '/api/backup';
const CONTENT_LABELS = {
  sessions: '对话', memories: '记忆', config: '配置',
  skills: '技能', state_db: 'state.db', kanban_db: '看板'
};

function fmtBytes(b) {
  if (!b) return '—';
  if (b < 1024)     return b + ' B';
  if (b < 1024**2)  return (b/1024).toFixed(1) + ' KB';
  if (b < 1024**3)  return (b/1024**2).toFixed(1) + ' MB';
  return (b/1024**3).toFixed(2) + ' GB';
}
function fmtDate(ms) {
  if (!ms) return '—';
  return new Date(ms).toLocaleString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── Local summary ─────────────────────────────────────────────────────────────
async function loadSummary() {
  try {
    const r = await fetch(API + '/local-summary');
    const d = await r.json();
    document.getElementById('summary-loading').style.display = 'none';
    const c = document.getElementById('summary-content');
    c.style.display = 'block';
    c.innerHTML = Object.entries(d).map(([k,v]) =>
      `<div style="display:flex;justify-content:space-between;font-size:0.85rem;padding:2px 0;color:var(--text-2)">
        <span>${CONTENT_LABELS[k]||k}</span><span>${fmtBytes(v)}</span>
       </div>`
    ).join('');
    Object.entries(d).forEach(([k,v]) => {
      const el = document.getElementById('sz-' + k);
      if (el) el.textContent = fmtBytes(v);
    });
  } catch(e) {
    document.getElementById('summary-loading').textContent = '加载失败: ' + e.message;
  }
}

// ── Create backup ─────────────────────────────────────────────────────────────
async function createBackup() {
  const selected = Array.from(document.querySelectorAll('input[type=checkbox]:checked'))
                        .map(c => c.value);
  if (!selected.length) { alert('请至少选择一项数据'); return; }

  const label  = document.getElementById('backup-label').value.trim();
  const btn    = document.getElementById('btn-create');
  const status = document.getElementById('create-status');
  const bar    = document.getElementById('progress-bar');
  const fill   = document.getElementById('progress-fill');

  btn.disabled = true;
  bar.style.display = 'block';
  fill.style.width = '15%';
  status.textContent = '打包并上传中…';

  try {
    fill.style.width = '40%';
    const r = await fetch(API + '/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label, contents: selected }),
    });
    fill.style.width = '90%';
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || '上传失败');
    fill.style.width = '100%';
    status.textContent = `✅ 备份成功 (${fmtBytes(d.sizeBytes)})`;
    document.getElementById('backup-label').value = '';
    setTimeout(() => { bar.style.display='none'; fill.style.width='0%'; }, 2000);
    loadList();
  } catch(e) {
    fill.style.width = '0%';
    bar.style.display = 'none';
    status.textContent = '❌ ' + e.message;
  }
  btn.disabled = false;
}

// ── List backups ───────────────────────────────────────────────────────────────
async function loadList() {
  const container = document.getElementById('backup-list-container');
  container.innerHTML = '<div class="empty">加载中…</div>';
  try {
    const r = await fetch(API + '/list');
    const d = await r.json();
    const backups = d.backups || [];
    if (!backups.length) {
      container.innerHTML = '<div class="empty">暂无备份。创建第一个备份后会显示在这里。</div>';
      return;
    }
    container.innerHTML = backups.map(b => `
      <div class="card" id="bkp-${b.backupId}">
        <div class="backup-row">
          <div class="backup-meta">
            <div class="backup-label">${escHtml(b.label || '（无标签）')}</div>
            <div class="backup-info">
              ${fmtDate(b.createdAt)} · ${fmtBytes(b.sizeBytes)}${b.hermesVersion?' · v'+escHtml(b.hermesVersion):''}
            </div>
            <div style="margin-top:6px">
              ${(b.contents||[]).map(c=>`<span class="chip">${CONTENT_LABELS[c]||escHtml(c)}</span>`).join('')}
            </div>
          </div>
          <div class="backup-actions">
            <button class="btn btn-ghost" onclick="restoreLocal('${escAttr(b.backupId)}', '${escAttr(b.label||'')}')">🖥 还原本地</button>
            <button class="btn btn-ghost" onclick="restoreCloud('${escAttr(b.backupId)}', '${escAttr(b.label||'')}')">☁ 还原云端</button>
            <button class="btn btn-danger" onclick="deleteBackup('${escAttr(b.backupId)}')">删除</button>
          </div>
        </div>
        <div class="status info" id="status-${b.backupId}" style="display:none"></div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = `<div class="card" style="color:var(--danger)">加载失败：${escHtml(e.message)}</div>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

function showBkpStatus(id, msg, type) {
  const el = document.getElementById('status-' + id);
  if (!el) return;
  el.textContent = msg; el.className = 'status ' + type; el.style.display = 'block';
}

async function restoreLocal(id, label) {
  if (!confirm(`确认将备份「${label||id}」还原到本地？\n当前数据会先保存为快照，然后覆盖。`)) return;
  showBkpStatus(id, '获取下载链接并还原中…', 'info');
  try {
    const r = await fetch(API + '/restore-local', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ backupId: id }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || '还原失败');
    showBkpStatus(id, `✅ 还原成功！快照已保存到 ${d.snapshotPath}。请重启 Hermes。`, 'ok');
  } catch(e) {
    showBkpStatus(id, '❌ 还原失败: ' + e.message, 'err');
  }
}

async function restoreCloud(id, label) {
  if (!confirm(`确认将备份「${label||id}」还原到云端实例？\n云端当前数据将被覆盖，实例会重启。`)) return;
  showBkpStatus(id, '还原到云端实例中…', 'info');
  try {
    const r = await fetch(API + '/restore-cloud', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ backupId: id }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || '还原失败');
    showBkpStatus(id, '✅ 云端还原成功，实例正在重启。', 'ok');
  } catch(e) {
    showBkpStatus(id, '❌ 还原失败: ' + e.message, 'err');
  }
}

async function deleteBackup(id) {
  if (!confirm('确认删除此备份？操作不可逆。')) return;
  showBkpStatus(id, '删除中…', 'info');
  try {
    const r = await fetch(API + '/delete-proxy', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ backupId: id }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || '删除失败');
    document.getElementById('bkp-' + id)?.remove();
  } catch(e) {
    showBkpStatus(id, '❌ 删除失败: ' + e.message, 'err');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadSummary();
loadList();
</script>
</body>
</html>
